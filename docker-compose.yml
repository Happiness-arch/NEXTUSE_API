version: '3.8'

services:
  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  node:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '8000:8000'
    environment:
      - MONGO_URI=mongodb://mongodb:27017/nextuse
      - PORT=8000
      - NODE_ENV=development
    depends_on:
      - mongodb

volumes:
  mongodb_data:
    driver: local
