name: App Runner Wake Sleep

on:
  workflow_dispatch:
    inputs:
      action:
        description: "resume or pause"
        required: true
        type: choice
        options:
          - resume
          - pause

jobs:
  wake_sleep:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resume or pause App Runner
        env:
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          if [ "${{ github.event.inputs.action }}" = "resume" ]; then
            aws apprunner resume-service --service-arn "$SERVICE_ARN"
          else
            aws apprunner pause-service --service-arn "$SERVICE_ARN"
          fi

      - name: Wait until running (only for resume)
        if: ${{ github.event.inputs.action == 'resume' }}
        env:
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          for i in {1..60}; do
            STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.Status' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Service is running."
              exit 0
            fi
            sleep 10
          done
          echo "Service did not reach RUNNING in time."
          exit 1
